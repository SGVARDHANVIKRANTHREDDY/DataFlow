events { worker_connections 2048; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    client_max_body_size 55M;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m  rate=10r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=20r/m;

    upstream backend  { server backend:8000;  keepalive 32; }
    upstream frontend { server frontend:80; }

    # FAANG FIX: Prevents large file upload buffering to disk (slows down upload significantly and causes IO locks)
    client_body_buffer_size 55M; 
    
    server {
        listen 80;
        listen 443 ssl;
        server_name _;

        # Self-signed for development. In prod, provision real certificates and mount them.
        ssl_certificate     /etc/nginx/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Force HTTPS
        error_page 497 =301 https://$host:$server_port$request_uri;

        # Auth endpoints — stricter rate limit
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Upload endpoint — strict rate limit
        location /api/v1/datasets {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass       http://backend;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }

        # General API
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /health { proxy_pass http://backend; }
        
        # Secured metrics - Internal Docker Network Only
        location /metrics { 
            proxy_pass http://backend; 
            # Allow Docker bridge subnets and localhost
            allow 127.0.0.1; 
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 10.0.0.0/8;
            deny all; 
        }

        # React SPA
        location / {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
        }
    }
}
