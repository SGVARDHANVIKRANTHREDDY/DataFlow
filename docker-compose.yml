version: "3.9"

# ── Shared env block ──────────────────────────────────────────
x-backend-env: &backend-env
  DATABASE_URL:          "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
  POSTGRES_HOST:         postgres
  POSTGRES_PORT:         "5432"
  POSTGRES_DB:           ${POSTGRES_DB}
  POSTGRES_USER:         ${POSTGRES_USER}
  POSTGRES_PASSWORD:     ${POSTGRES_PASSWORD}
  REDIS_HOST:            redis
  REDIS_PORT:            "6379"
  S3_ENDPOINT_URL:       "http://minio:9000"
  S3_ACCESS_KEY_ID:      ${MINIO_ROOT_USER}
  S3_SECRET_ACCESS_KEY:  ${MINIO_ROOT_PASSWORD}
  S3_BUCKET_RAW:         dps-raw
  S3_BUCKET_OUTPUT:      dps-output
  ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY}
  SECRET_KEY:            ${SECRET_KEY}
  CORS_ORIGINS:          ${CORS_ORIGINS:-http://localhost,http://localhost:80}
  DEBUG:                 "false"


services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-dps}
      POSTGRES_USER:     ${POSTGRES_USER:-dps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dps_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dps}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 512m }

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 320m }

  # ── MinIO (S3-compatible) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"    # MinIO console (remove in production)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 512m }

  # ── DB migration runner ───────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head"
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── FastAPI backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment: *backend-env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2
      resources:
        limits: { memory: 1g }

  # ── Celery profiling worker ───────────────────────────────
  worker-profiling:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A app.celery_app.celery_app worker --queues=profiling --concurrency=4 --loglevel=info
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1
      resources:
        limits: { memory: 1g }

  # ── Celery execution worker ───────────────────────────────
  worker-execution:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A app.celery_app.celery_app worker --queues=execution --concurrency=2 --loglevel=info
    restart: unless-stopped
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits: { memory: 2g }

  # ── Celery Flower (monitoring) ────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    command: celery -A app.celery_app.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "5555:5555"
    environment: *backend-env
    depends_on:
      - redis
    restart: unless-stopped

  # ── React frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    deploy:
      resources:
        limits: { memory: 128m }

  # ── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits: { memory: 64m }


volumes:
  postgres_data:
  redis_data:
  minio_data:
